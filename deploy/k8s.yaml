apiVersion: apps/v1
kind: Deployment
metadata: { name: electionlens, labels: { app: electionlens } }
spec:
  replicas: 1
  selector: { matchLabels: { app: electionlens } }
  template:
    metadata: { labels: { app: electionlens } }
    spec:
      containers:
        - name: electionlens
          image: ghcr.io/cognis-digital/electionlens:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: electionlens }
spec:
  selector: { app: electionlens }
  ports: [{ port: 80, targetPort: 8000 }]
